<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Postventa</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente moderna -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">

<div class="login-wrapper">

  <!-- CARD LOGIN -->
  <div class="login-card shadow-sm">

    <!-- Logo / Branding -->
    <div class="text-center mb-4">
      <h3 class="fw-semibold">Postventa</h3>
      <p class="text-muted small">Gestión de reclamos y devoluciones</p>
    </div>

    <!-- FORM -->
    <div class="mb-3">
      <label class="form-label small">Correo</label>
      <input id="email" type="email" class="form-control" placeholder="ejemplo@correo.com">
    </div>

    <div class="mb-3">
      <label class="form-label small">Contraseña</label>
      <input id="password" type="password" class="form-control" placeholder="••••••••">
    </div>

    <button class="btn btn-primary w-100 mt-2" onclick="login()">
      Ingresar
    </button>

    <!-- Extra UX -->
    <div class="text-center mt-3">
      <small class="text-muted">¿Problemas para ingresar?</small>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
