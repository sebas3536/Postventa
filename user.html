<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Solicitudes</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white shadow-sm px-4">
  <span class="navbar-brand fw-semibold">Postventa</span>
  <button class="btn btn-outline-secondary btn-sm" onclick="logout()">Salir</button>
</nav>

<div class="container py-4">

  <!-- HEADER -->
  <div class="mb-4">
    <h3 class="fw-semibold">Mis Solicitudes</h3>
    <p class="text-muted">Gestiona tus reclamos y revisa su estado</p>
  </div>

  <!-- FORM -->
  <div class="card shadow-sm border-0 mb-4">
    <div class="card-body">
      <h6 class="fw-semibold mb-3">Nuevo Reclamo</h6>
      
      <div class="row g-2">
        <div class="col-md-9">
          <input id="description" class="form-control" placeholder="Describe tu problema...">
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="createCase()">Enviar</button>
        </div>
      </div>

    </div>
  </div>

  <!-- LISTA -->
  <div class="card shadow-sm border-0">
    <div class="card-body">
      <h6 class="fw-semibold mb-3">Historial</h6>
      <div id="cases"></div>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script>initUserView()</script>

</body>
</html>
